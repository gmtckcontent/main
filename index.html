<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>페이지를 찾을 수 없습니다 - GMTCK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Roboto", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: transparent;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: transparent;
        }
        
        
        .error-subtitle {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 30px;
            color: #000000;
            line-height: 1.6;
        }
        
        .error-message {
            font-size: 16px;
            line-height: 1.8;
            color: #000000;
            margin-bottom: 40px;
        }
        
        .error-info {
            background: transparent;
            padding: 30px;
            margin-top: 40px;
        }
        
        .error-info p {
            font-size: 14px;
            color: #000000;
            margin-bottom: 10px;
        }
        
        .error-info p:last-child {
            margin-bottom: 0;
        }
        
        @media (max-width: 768px) {
            .error-container {
                padding: 40px 30px;
            }
            
            .error-subtitle {
                font-size: 18px;
            }
            
            .error-message {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <p class="error-subtitle">Page Not Found</p>
        <div class="error-message">
            <p>요청하신 페이지를 찾을 수 없습니다.</p>
            <p>입력하신 주소가 정확한지 확인해 주세요.</p>
            <br>
            <p>The page you are looking for could not be found.</p>
        </div>
        <div class="error-info">
            <p>We apologize for any inconvenience.</p>
        </div>
    </div>
</body>
</html>

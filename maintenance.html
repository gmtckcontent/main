<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="naver-site-verification"
      content="af568a23e47a0881ffe63f227204c37cfd9ac881"
    />
    <title>사이트 점검 중 - GMTCK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Roboto", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #002d5c 0%, #001a35 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .maintenance-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .maintenance-logo {
            width: 120px;
            height: auto;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: -1px;
        }
        
        .maintenance-subtitle {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }
        
        .maintenance-message {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }
        
        .maintenance-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-top: 40px;
        }
        
        .maintenance-info p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }
        
        .maintenance-info p:last-child {
            margin-bottom: 0;
        }
        
        @media (max-width: 768px) {
            .maintenance-container {
                padding: 40px 30px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .maintenance-subtitle {
                font-size: 18px;
            }
            
            .maintenance-message {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <img src="./images/logo/GMTCK.png" alt="GMTCK" class="maintenance-logo" />
        <h1>사이트 점검 중</h1>
        <p class="maintenance-subtitle">Site Under Maintenance</p>
        <div class="maintenance-message">
            <p>현재 사이트가 점검 중입니다.</p>
            <p>잠시 후 다시 방문해 주시기 바랍니다.</p>
            <br>
            <p>The site is currently under maintenance.</p>
            <p>Please visit again later.</p>
        </div>
        <div class="maintenance-info">
            <p><strong>GMTCK</strong> - General Motors Technical Center Korea</p>
            <p>We apologize for any inconvenience.</p>
        </div>
    </div>
</body>
</html>

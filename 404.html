<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>페이지를 찾을 수 없습니다 - GMTCK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Roboto", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #002d5c 0%, #001a35 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .error-logo {
            width: 120px;
            height: auto;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: -5px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: -1px;
        }
        
        .error-subtitle {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }
        
        .error-message {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }
        
        .error-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-top: 40px;
        }
        
        .error-info p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }
        
        .error-info p:last-child {
            margin-bottom: 0;
        }
        
        @media (max-width: 768px) {
            .error-container {
                padding: 40px 30px;
            }
            
            .error-code {
                font-size: 80px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .error-subtitle {
                font-size: 18px;
            }
            
            .error-message {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="./images/logo/GMTCK.png" alt="GMTCK" class="error-logo" />
        <div class="error-code">404</div>
        <h1>페이지를 찾을 수 없습니다</h1>
        <p class="error-subtitle">Page Not Found</p>
        <div class="error-message">
            <p>요청하신 페이지를 찾을 수 없습니다.</p>
            <p>입력하신 주소가 정확한지 확인해 주세요.</p>
            <br>
            <p>The page you are looking for could not be found.</p>
            <p>Please check the URL and try again.</p>
        </div>
        <div class="error-info">
            <p><strong>GMTCK</strong> - General Motors Technical Center Korea</p>
            <p>We apologize for any inconvenience.</p>
        </div>
    </div>
</body>
</html>
